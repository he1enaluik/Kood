<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarukoda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@800&family=Inter:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <a href="#" class="header__logo" aria-label="Tarukoda avaleht">
        <span class="header__logo-icon" aria-hidden="true"></span>
        <span class="header__logo-text">TARUKODA</span>
      </a>

      <nav class="header__nav" aria-label="Peamenüü">
        <ul class="header__menu">
          <li><a href="#">Avaleht</a></li>
          <li><a href="#">Tooted</a></li>
          <li><a href="#">Kontakt</a></li>
          <li><a href="#">Meist</a></li>
        </ul>

        <div class="header__actions">
          <a href="#" class="header__icon header__icon--search" aria-label="Otsi"></a>
          <a href="#" class="header__icon header__icon--profile" aria-label="Profiil"></a>
        </div>
      </nav>
    </div>
  </header>

  <section class="hero" aria-label="Avalehe sissejuhatus">
    <img
      class="hero__image"
      src="pildid/hero-taust.png"
      alt=""
      width="1920"
      height="993"
      loading="lazy"
    >
    <img
      class="hero__swirl"
      src="Designi elemendid/Swirlywirly.png"
      alt=""
      width="1920"
      loading="lazy"
    >
    <div class="hero__inner">
      <div class="hero__content">
        <h1 class="hero__title">Mahemesi Eesti<br>puhtast loodusest.</h1>
        <p class="hero__text">Tarukoda on väike Eesti mesindustalu, kus austame looduse rütmi ning hoolitseme iga mesilaspere eest armastuse ja pühendumusega. Meie mesi jõuab Sinuni täpselt sellisena, nagu loodus selle loonud on.</p>
      </div>
    </div>
  </section>
</body>
</html>
