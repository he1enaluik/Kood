<body>
  <a class="skip-link" href="#main-content">Liigu põhisisu juurde</a>

  <header class="header">
    <div class="header__inner container">
      <a href="index.html" class="header__logo" aria-label="Avaleht">
        <span class="header__logo-icon" aria-hidden="true"></span>
        <span class="header__logo-text">TARUKODA</span>
      </a>

      <button
        type="button"
        class="header__menu-toggle"
        id="header-menu-toggle"
        aria-label="Ava menüü"
        aria-expanded="false"
        aria-controls="header-mobile-panel"
      >
        <span class="header__menu-toggle-bar" aria-hidden="true"></span>
        <span class="header__menu-toggle-bar" aria-hidden="true"></span>
        <span class="header__menu-toggle-bar" aria-hidden="true"></span>
      </button>

      <nav class="header__nav" aria-label="Peamenüü">
        <ul class="header__menu">
          <li><a href="index.html">Avaleht</a></li>
          <li><a href="tooted.html">Tooted</a></li>
          <li><a href="kontakt.html">Kontakt</a></li>
          <li><a href="index.html#our-mission">Meist</a></li>
        </ul>

        <div class="header__actions">
          <a href="tellimus.html" class="header__cart-wrap" aria-label="Ostukorv">

              <span class="header__icon header__icon--profile"></span>
            </a>
            <div class="header__profile-menu" id="header-profile-menu" hidden>
              <p class="header__profile-greeting">Tere, <span id="header-profile-name"></span>!</p>

          <li><a href="index.html#our-mission">Meist</a></li>
        </ul>
      </nav>

  <main class="order-page order-page--success" aria-labelledby="order-success-title">
    <picture><source srcset="Designi%20elemendid/Mesilask%C3%A4rg1.webp" type="image/webp"><img
      class="order-page__decor order-page__decor--honeycomb-left"
      src="Designi%20elemendid/Mesilask%C3%A4rg1.png"
      alt=""
      width="200"
      aria-hidden="true"
    ></picture>
    <picture><source srcset="Designi%20elemendid/Mesilask%C3%A4rg1_SUUR.webp" type="image/webp"><img
      class="order-page__decor order-page__decor--honeycomb-right"
      src="Designi%20elemendid/Mesilask%C3%A4rg1_SUUR.png"
      alt=""
      width="130"
      aria-hidden="true"
    ></picture>

    <div class="container">
      <div class="order-page__box order-page__box--success">
        <h1 id="order-success-title" class="order-page__heading">Aitäh tellimuse eest!</h1>
        <p class="order-page__subtitle">Makse õnnestus. Võtame sinuga peagi ühendust tarne kinnitamiseks.</p>
        <p class="order-page__success-note" id="order-success-session" hidden></p>
        <a href="tooted.html" class="contact-page__submit order-page__success-link">Tagasi toodete juurde</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer__divider" aria-hidden="true"></div>
      <div class="footer__bottom">
        <p>© 2026 Tarukoda OÜ • Reg. 12345678</p>
      </div>
    </div>
  </footer>

  <script src="js/cart.js" defer></script>
  <script src="js/auth.js?v=3" defer></script>
  <script src="js/mobile-nav.js" defer></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      window.TarukodaCart?.clearCart();

      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session_id");
      const note = document.getElementById("order-success-session");

      if (sessionId && note) {
        note.textContent = "Makse ID: " + sessionId;
        note.hidden = false;
      }
    });
  </script>
</body>
